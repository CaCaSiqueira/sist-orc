<svg xmlns="http://www.w3.org/2000/svg" width="380" height="125" viewBox="0 0 380 125">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
  </defs>

  <!-- Icon background -->
  <rect x="8" y="8" width="84" height="84" rx="22" fill="url(#iconGrad)"/>

  <!-- Chart bars -->
  <rect x="22" y="62" width="12" height="18" rx="3" fill="white" opacity="0.85"/>
  <rect x="38" y="50" width="12" height="30" rx="3" fill="white" opacity="0.85"/>
  <rect x="54" y="38" width="12" height="42" rx="3" fill="white" opacity="0.85"/>

  <!-- Trend arrow line -->
  <polyline points="22,56 44,42 66,30" stroke="white" stroke-width="2.5" fill="none"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.75"/>
  <circle cx="66" cy="30" r="4" fill="white" opacity="0.95"/>

  <!-- System name -->
  <text x="112" y="52"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="30" font-weight="700" letter-spacing="0.5"
        fill="url(#textGrad)">Finanças Pro</text>

  <!-- Separator -->
  <line x1="112" y1="64" x2="368" y2="64" stroke="#6C5CE7" stroke-width="1.2" opacity="0.5"/>

  <!-- Author / copyright -->
  <text x="112" y="80"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#a29bfe" opacity="0.85" letter-spacing="0.3">
    © 2026 Carina Siqueira
  </text>
  <text x="112" y="95"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#a29bfe" opacity="0.85" letter-spacing="0.3">
    Todos os direitos reservados
  </text>

  <!-- Tagline -->
  <rect x="110" y="101" width="198" height="18" rx="5" fill="#6C5CE7" opacity="0.18"/>
  <text x="209" y="114"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="10.5" font-weight="600" fill="#00CEC9" opacity="1"
        letter-spacing="1.2" text-anchor="middle">
    CONTROLE FINANCEIRO INTELIGENTE
  </text>
</svg>
